# Set root logger to WARN to reduce noise
rootLogger.level = warn
rootLogger.appenderRef.stdout.ref = console

# Console appender
appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Suppress noisy loggers
logger.nativeCodeLoader.name = org.apache.hadoop.util.NativeCodeLoader
logger.nativeCodeLoader.level = error

logger.metricsConfig.name = org.apache.hadoop.metrics2.impl.MetricsConfig
logger.metricsConfig.level = error

logger.versionInfo.name = com.amazonaws.util.VersionInfoUtils
logger.versionInfo.level = error

logger.fileSystem.name = org.apache.hadoop.fs.FileSystem
logger.fileSystem.level = error

logger.s3a.name = org.apache.hadoop.fs.s3a
logger.s3a.level = error

logger.base64.name = com.amazonaws.internal.Base64
logger.base64.level = error

logger.hiveExternalCatalog.name = org.apache.spark.sql.hive.HiveExternalCatalog
logger.hiveExternalCatalog.level = error

logger.updateCommand.name = org.apache.spark.sql.delta.commands.UpdateCommand
logger.updateCommand.level = error

logger.sparkStringUtils.name = org.apache.spark.sql.catalyst.util.SparkStringUtils
logger.sparkStringUtils.level = error

# Keep Delta Lake and Spark SQL at INFO for important messages
logger.delta.name = io.delta
logger.delta.level = info

logger.sparkSql.name = org.apache.spark.sql
logger.sparkSql.level = warn
