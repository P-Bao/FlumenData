# FlumenData Tier 3: Orchestration & BI
# Initial services: Trino

services:
  # =============================================================================
  # Trino - Distributed SQL engine
  # =============================================================================
  trino:
    container_name: flumen_trino
    image: trinodb/trino:${TRINO_VERSION:-450}
    hostname: trino
    depends_on:
      hive-metastore:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${TRINO_PORT:-8082}:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx4G
    volumes:
      - ./config/trino/config.properties:/etc/trino/config.properties:ro
      - ./config/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./config/trino/node.properties:/etc/trino/node.properties:ro
      - ./config/trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  # =============================================================================
  # Superset - BI dashboarding
  # =============================================================================
  superset:
    container_name: flumen_superset
    image: flumendata/superset:${SUPERSET_VERSION:-5.0.0}
    build:
      context: .
      dockerfile: docker/superset.Dockerfile
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-5.0.0}
    hostname: superset
    depends_on:
      trino:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    env_file:
      - ./config/superset/superset.env
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_home/superset_config.py
      REDIS_URL: redis://valkey:${VALKEY_PORT:-6379}/0
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary sqlalchemy-trino gevent>=24.2.1"
    volumes:
      - superset_home:/app/superset_home
      - ./config/superset/superset_config.py:/app/superset_home/superset_config.py:ro
    command:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        superset db upgrade
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USERNAME}" \
          --firstname "${SUPERSET_ADMIN_FIRST_NAME}" \
          --lastname "${SUPERSET_ADMIN_LAST_NAME}" \
          --email "${SUPERSET_ADMIN_EMAIL}" \
          --password "${SUPERSET_ADMIN_PASSWORD}" || true
        superset init
        gunicorn -w 4 -k gevent --timeout 120 -b 0.0.0.0:8088 'superset.app:create_app()'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
  # =============================================================================
  # Airflow - All-in-one scheduler + webserver
  # =============================================================================
  airflow:
    container_name: flumen_airflow
    image: apache/airflow:${AIRFLOW_VERSION:-3.1.2}
    hostname: airflow
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - "${AIRFLOW_PORT:-8085}:8080"
    env_file:
      - ./config/airflow/airflow.env
    volumes:
      - airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command:
      - standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  superset_home:
    name: flumen_superset_home
    driver: local
  airflow_dags:
    name: flumen_airflow_dags
    driver: local
  airflow_logs:
    name: flumen_airflow_logs
    driver: local
  airflow_plugins:
    name: flumen_airflow_plugins
    driver: local
