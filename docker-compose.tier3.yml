# FlumenData Tier 3: Orchestration & BI
# Initial services: Trino

services:
  # =============================================================================
  # Trino - Distributed SQL engine
  # =============================================================================
  trino:
    container_name: flumen_trino
    image: trinodb/trino:${TRINO_VERSION:-450}
    hostname: trino
    depends_on:
      hive-metastore:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${TRINO_PORT:-8082}:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx4G
    volumes:
      - ./config/trino/config.properties:/etc/trino/config.properties:ro
      - ./config/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./config/trino/node.properties:/etc/trino/node.properties:ro
      - ./config/trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/info" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  # =============================================================================
  # Superset - BI dashboarding
  # =============================================================================
  superset:
    container_name: flumen_superset
    image: phbao/superset:${SUPERSET_VERSION:-5.0.0}
    build:
      context: .
      dockerfile: docker/superset.Dockerfile
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-5.0.0}
    hostname: superset
    depends_on:
      trino:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    env_file:
      - ./config/superset/superset.env
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_home/superset_config.py
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary sqlalchemy-trino gevent>=24.2.1"
    volumes:
      - superset_data:/app/superset_home
      - ./config/superset/superset_config.py:/app/superset_home/superset_config.py:ro
    command:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        superset db upgrade
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USERNAME}" \
          --firstname "${SUPERSET_ADMIN_FIRST_NAME}" \
          --lastname "${SUPERSET_ADMIN_LAST_NAME}" \
          --email "${SUPERSET_ADMIN_EMAIL}" \
          --password "${SUPERSET_ADMIN_PASSWORD}" || true
        superset init
        gunicorn -w 4 -k gevent --timeout 120 -b 0.0.0.0:8088 'superset.app:create_app()'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped


# =============================================================================
# Volumes
# =============================================================================
volumes:
  superset_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    external: true
    name: flumendata_default
