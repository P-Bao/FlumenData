site_name: FlumenData
site_description: Open Source Lakehouse Platform with Spark, Hive Metastore, and Delta Lake
site_author: FlumenData Team
site_url: https://flumendata.io

repo_name: flumendata/flumendata
repo_url: https://github.com/flumendata/flumendata
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        en:
          name: English
          build: true
        pt:
          name: Português
          build: true
      nav_translations:
        pt:
          Home: Início
          Services: Serviços
          Tier 0 - Foundation: Tier 0 - Fundação
          Tier 1 - Data Platform: Tier 1 - Plataforma de Dados
          PostgreSQL: PostgreSQL
          Valkey: Valkey
          MinIO: MinIO
          Hive Metastore: Hive Metastore
          Apache Spark: Apache Spark
          Getting Started: Começando
          Architecture: Arquitetura
          Configuration: Configuração
          Commands: Comandos

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/flumendata/flumendata
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/flumendata
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Architecture: getting-started/architecture.md
  - Services:
      - Tier 0 - Foundation:
          - PostgreSQL: services/postgres.md
          - Valkey: services/valkey.md
          - MinIO: services/minio.md
      - Tier 1 - Data Platform:
          - Hive Metastore: services/hive.md
          - Apache Spark: services/spark.md
  - Configuration:
      - Environment Variables: configuration/environment.md
      - Make Commands: configuration/commands.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
