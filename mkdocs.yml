site_name: FlumenData
site_description: Open Source Lakehouse Platform with Spark, Hive Metastore, and Delta Lake
site_author: Luciano Mauda Junior
site_url: https://www.flumendata.com

repo_name: lucianomauda/FlumenData
repo_url: https://github.com/lucianomauda/FlumenData
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/images/flumendata-logoonly.png
  favicon: assets/images/flumendata.ico
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
        - locale: pt
          name: Português
          build: true
        - locale: vi
          name: Tiếng Việt
          build: true
      nav_translations:
        pt:
          Home: Início
          Services: Serviços
          Tier 0 - Foundation: Tier 0 - Fundação
          Tier 1 - Data Platform: Tier 1 - Plataforma de Dados
          Tier 2 - Analytics & Development: Tier 2 - Analytics & Desenvolvimento
          Tier 3 - SQL & BI: Tier 3 - SQL & BI
          PostgreSQL: PostgreSQL
          MinIO: MinIO
          Hive Metastore: Hive Metastore
          Apache Spark: Apache Spark
          JupyterLab: JupyterLab
          Superset: Superset
          Trino: Trino
          Getting Started: Começando
          Installation: Instalação
          Quick Start: Início Rápido
          Architecture: Arquitetura
          Medallion Architecture: Arquitetura Medallion
          Configuration: Configuração
          Environment Variables: Variáveis de Ambiente
          CLI Reference: Referência CLI
          Development: Desenvolvimento
          Testing: Testes
        vi:
          Home: Trang chủ
          Services: Dịch vụ
          Tier 0 - Foundation: Tầng 0 - Nền tảng
          Tier 1 - Data Platform: Tầng 1 - Nền tảng Dữ liệu
          Tier 2 - Analytics & Development: Tầng 2 - Phân tích & Phát triển
          Tier 3 - SQL & BI: Tầng 3 - SQL & BI
          PostgreSQL: PostgreSQL
          MinIO: MinIO
          Hive Metastore: Hive Metastore
          Apache Spark: Apache Spark
          JupyterLab: JupyterLab
          Superset: Superset
          Trino: Trino
          Getting Started: Bắt đầu
          Installation: Cài đặt
          Quick Start: Bắt đầu nhanh
          Architecture: Kiến trúc
          Medallion Architecture: Kiến trúc Medallion
          Configuration: Cấu hình
          Environment Variables: Biến môi trường
          CLI Reference: Tài liệu lệnh CLI
          Development: Phát triển
          Testing: Kiểm thử

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/styles/brand.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lucianomauda
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/lucianomaudajunior/?locale=en_US
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Architecture: getting-started/architecture.md
      - Medallion Architecture: getting-started/medallion.md
  - Services:
      - Tier 0 - Foundation:
          - PostgreSQL: services/postgres.md
          - MinIO: services/minio.md
      - Tier 1 - Data Platform:
          - Hive Metastore: services/hive.md
          - Apache Spark: services/spark.md
      - Tier 2 - Analytics & Development:
          - JupyterLab: services/jupyterlab.md
      - Tier 3 - SQL & BI:
          - Trino: services/trino.md
          - Superset: services/superset.md
  - Configuration:
      - Environment Variables: configuration/environment.md
      - CLI Reference: configuration/commands.md
  - Development:
      - Testing: development/testing.md
